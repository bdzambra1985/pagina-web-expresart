<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EXPRESART — Portafolio de Artistas</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, #3a000f 0%, #130002 55%, #060002 100%);
            font-family: 'Poppins', sans-serif;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(201,162,39,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(180,10,10,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .gallery-wrap {
            position: relative;
            z-index: 1;
            padding: 32px 24px 70px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Encabezado ── */
        .gallery-heading {
            text-align: center;
            margin-bottom: 52px;
        }
        .gallery-heading .eyebrow {
            font-size: 0.68em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.85);
            margin-bottom: 8px;
        }
        .gallery-heading h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.9rem, 5vw, 3.2rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(200,30,30,0.40);
        }
        .gold-rule {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto 0;
        }

        /* ── Grid ── */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 28px;
        }

        /* ── Tarjeta ── */
        .student-card {
            background: rgba(255,255,255,0.055);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(201,162,39,0.18);
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.30s ease, box-shadow 0.30s ease;
        }
        .student-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,162,39,0.28);
        }

        .card-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            display: block;
        }
        .card-img-placeholder {
            width: 100%;
            height: 230px;
            background: linear-gradient(135deg, #3a0010 0%, #1a0005 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .card-img-placeholder i {
            font-size: 4rem;
            color: rgba(201,162,39,0.35);
        }
        .card-img-placeholder span {
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.35);
        }

        .card-body {
            padding: 22px 22px 18px;
        }
        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.28rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .card-bio {
            font-size: 0.77rem;
            line-height: 1.55;
            color: rgba(255,220,220,0.60);
            margin-bottom: 14px;
            min-height: 36px;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .card-tag {
            font-size: 0.62rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 3px 11px;
            border: 1px solid rgba(201,162,39,0.38);
            border-radius: 20px;
            color: rgba(201,162,39,0.88);
        }
        .card-stats {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
        }
        .card-stat {
            font-size: 0.70rem;
            color: rgba(255,200,200,0.45);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-stat i { font-size: 0.95rem; }

        .card-btn {
            display: block;
            width: 100%;
            padding: 11px;
            background: rgba(158,0,0,0.55);
            border: 1px solid rgba(220,40,40,0.38);
            border-radius: 9px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-size: 0.76rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            transition: background 0.25s, box-shadow 0.25s;
        }
        .card-btn:hover {
            background: rgba(200,15,15,0.72);
            box-shadow: 0 0 22px rgba(220,30,30,0.32);
        }

        /* ── Estado vacío ── */
        .empty-state {
            text-align: center;
            padding: 90px 20px;
            grid-column: 1 / -1;
        }
        .empty-state i {
            font-size: 4.5rem;
            color: rgba(201,162,39,0.25);
            display: block;
            margin-bottom: 18px;
        }
        .empty-state p {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-style: italic;
            color: rgba(255,255,255,0.30);
        }

        .loading-msg {
            text-align: center;
            padding: 70px;
            grid-column: 1 / -1;
            color: rgba(255,255,255,0.35);
            font-size: 0.85rem;
        }

        @media (max-width: 520px) {
            .gallery-wrap { padding: 80px 14px 50px; }
            .students-grid { grid-template-columns: 1fr; gap: 18px; }
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-inner">
        <ul class="nav-links">
            <li><a href="index.html"      class="nav-link">Inicio</a></li>
            <li><a href="cartelera.html"  class="nav-link">Cartelera</a></li>
            <li><a href="agenda.html"     class="nav-link">Agenda</a></li>
            <li><a href="nosotros.html"   class="nav-link">Nosotros</a></li>
            <li><a href="portafolio.html" class="nav-link active">Portafolio</a></li>
            <li><a href="login.html"      class="nav-link" id="navLoginLink">Login</a></li>
            <li><a href="#"               class="nav-link nav-cta">Entradas</a></li>
        </ul>
    </div>
</nav>

<section class="page-hero">
    <div class="hero-bg"></div>
    <div class="hero-curtain-l"></div>
    <div class="hero-curtain-r"></div>
    <div class="hero-light"></div>
    <div class="hero-content">
        <p class="hero-label">Escuela de Actuación</p>
        <h1 class="hero-title">Nuestros Artistas</h1>
        <div class="hero-rule"></div>
    </div>
</section>

<div class="gallery-wrap">

    <div class="students-grid" id="studentsGrid">
        <div class="loading-msg">Cargando perfiles…</div>
    </div>

</div>

<script src="common.js"></script>
<script>
    initNavAuth();

    /* Cargar galería de alumnos */
    fetch('/api/profiles')
        .then(r => r.json())
        .then(profiles => {
            const grid = document.getElementById('studentsGrid');
            if (!profiles.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="bx bx-mask"></i>
                        <p>Próximamente — los perfiles de nuestros artistas</p>
                    </div>`;
                return;
            }
            grid.innerHTML = profiles.map(p => `
                <div class="student-card">
                    ${p.photoUrl
                        ? `<img class="card-img" src="${p.photoUrl}" alt="${esc(p.displayName)}">`
                        : `<div class="card-img-placeholder">
                               <i class="bx bx-user-circle"></i>
                               <span>Artista</span>
                           </div>`
                    }
                    <div class="card-body">
                        <div class="card-name">${esc(p.displayName)}</div>
                        <div class="card-bio">${esc(p.bio_short)}</div>
                        ${p.especialidades && p.especialidades.length
                            ? `<div class="card-tags">${p.especialidades.slice(0,3).map(e => `<span class="card-tag">${esc(e)}</span>`).join('')}</div>`
                            : ''
                        }
                        <div class="card-stats">
                            ${p.producciones ? `<span class="card-stat"><i class="bx bx-mask"></i>${p.producciones} obra${p.producciones !== 1 ? 's' : ''}</span>` : ''}
                            ${p.videos ? `<span class="card-stat"><i class="bx bx-play-circle"></i>${p.videos} video${p.videos !== 1 ? 's' : ''}</span>` : ''}
                        </div>
                        <a href="portafolio-alumno.html?id=${p.userId}" class="card-btn">Ver Portafolio</a>
                    </div>
                </div>`).join('');
        })
        .catch(() => {
            document.getElementById('studentsGrid').innerHTML = `
                <div class="empty-state">
                    <i class="bx bx-mask"></i>
                    <p>No se pudo cargar los perfiles</p>
                </div>`;
        });

</script>
</body>
</html>
