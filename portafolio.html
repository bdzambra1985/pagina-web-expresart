<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EXPRESART — Portafolio de Artistas</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, #3a000f 0%, #130002 55%, #060002 100%);
            font-family: 'Poppins', sans-serif;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(201,162,39,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(180,10,10,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .gallery-wrap {
            position: relative;
            z-index: 1;
            padding: 32px 24px 70px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Encabezado ── */
        .gallery-heading {
            text-align: center;
            margin-bottom: 52px;
        }
        .gallery-heading .eyebrow {
            font-size: 0.68em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.85);
            margin-bottom: 8px;
        }
        .gallery-heading h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.9rem, 5vw, 3.2rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(200,30,30,0.40);
        }
        .gold-rule {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto 0;
        }

        /* ── Grid ── */
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* ── Tarjeta ── */
        .student-card {
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.32s ease, box-shadow 0.32s ease;
            box-shadow: 0 4px 24px rgba(0,0,0,0.45);
        }
        .student-card:hover {
            transform: translateY(-8px) scale(1.015);
            box-shadow: 0 20px 56px rgba(0,0,0,0.65), 0 0 0 1px rgba(201,162,39,0.35);
        }

        /* ── Media (imagen o placeholder) ── */
        .card-media {
            position: relative;
            width: 100%;
            height: 340px;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-img-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #3d0012 0%, #1a0005 60%, #0d0002 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .card-img-placeholder i {
            font-size: 5rem;
            color: rgba(201,162,39,0.25);
        }
        .card-img-placeholder span {
            font-size: 0.58rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.28);
        }

        /* ── Overlay con info ── */
        .card-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top,
                rgba(6,0,2,0.97) 0%,
                rgba(6,0,2,0.88) 40%,
                rgba(6,0,2,0.45) 72%,
                transparent 100%);
            padding: 28px 20px 20px;
        }
        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.22rem;
            font-weight: 700;
            color: #d4aa2e;
            margin-bottom: 4px;
            line-height: 1.25;
            text-shadow: 0 1px 4px rgba(0,0,0,0.60);
        }
        .card-bio {
            font-size: 0.72rem;
            color: rgba(255,210,210,0.62);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .card-tag {
            font-size: 0.56rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 9px;
            border: 1px solid rgba(201,162,39,0.42);
            border-radius: 20px;
            color: rgba(201,162,39,0.90);
        }
        .card-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }
        .card-stat {
            font-size: 0.66rem;
            color: rgba(255,200,200,0.45);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-stat i { font-size: 0.9rem; }

        .card-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: rgba(160,5,5,0.70);
            border: 1px solid rgba(220,40,40,0.45);
            border-radius: 8px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-size: 0.70rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            transition: background 0.22s, box-shadow 0.22s;
        }
        .card-btn:hover {
            background: rgba(200,10,10,0.85);
            box-shadow: 0 0 20px rgba(220,20,20,0.35);
        }

        /* ── Estado vacío ── */
        .empty-state {
            text-align: center;
            padding: 90px 20px;
            grid-column: 1 / -1;
        }
        .empty-state i {
            font-size: 4.5rem;
            color: rgba(201,162,39,0.25);
            display: block;
            margin-bottom: 18px;
        }
        .empty-state p {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-style: italic;
            color: rgba(255,255,255,0.30);
        }
        .loading-msg {
            text-align: center;
            padding: 70px;
            grid-column: 1 / -1;
            color: rgba(255,255,255,0.35);
            font-size: 0.85rem;
        }

        @media (max-width: 680px) {
            .gallery-wrap { padding: 70px 10px 50px; }
            .students-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card-media { height: 240px; }
            .card-overlay { padding: 18px 12px 14px; }
            .card-name { font-size: 0.95rem; }
            .card-bio { font-size: 0.65rem; margin-bottom: 6px; }
            .card-tag { font-size: 0.50rem; padding: 2px 7px; }
            .card-stats { margin-bottom: 10px; }
            .card-btn { font-size: 0.62rem; letter-spacing: 1px; padding: 8px; }
        }
        @media (max-width: 360px) {
            .students-grid { grid-template-columns: 1fr; }
            .card-media { height: 280px; }
        }
    </style>

</head>
