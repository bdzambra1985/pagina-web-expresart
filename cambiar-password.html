<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EXPRESART — Cambiar Contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #060002;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 35%, #500020 0%, #220008 50%, #060002 100%);
            z-index: 0;
        }
        .login-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 15% 85%, rgba(201,162,39,0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(180,10,10,0.10) 0%, transparent 50%);
        }

        .curtain-l, .curtain-r {
            position: fixed;
            top: 0; bottom: 0;
            width: 14vw;
            z-index: 1;
            pointer-events: none;
        }
        .curtain-l {
            left: 0;
            background:
                repeating-linear-gradient(90deg,
                    rgba(0,0,0,0.38) 0px, rgba(0,0,0,0.10) 6px,
                    transparent 14px, rgba(0,0,0,0.30) 22px,
                    rgba(0,0,0,0.08) 28px, transparent 38px
                ),
                linear-gradient(to right, #6b0000 0%, #9e0000 60%, transparent 100%);
        }
        .curtain-r {
            right: 0;
            background:
                repeating-linear-gradient(90deg,
                    transparent 0px, rgba(0,0,0,0.08) 10px,
                    rgba(0,0,0,0.30) 18px, transparent 28px,
                    rgba(0,0,0,0.10) 34px, rgba(0,0,0,0.38) 42px
                ),
                linear-gradient(to left, #6b0000 0%, #9e0000 60%, transparent 100%);
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 380px;
            max-width: 92vw;
            padding: 44px 40px 38px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.14);
            border-top: 1px solid rgba(255,255,255,0.28);
            box-shadow: 0 30px 80px rgba(0,0,0,0.65), 0 0 0 1px rgba(180,10,10,0.14), inset 0 1px 0 rgba(255,255,255,0.18);
            animation: cardIn 0.8s ease-out both;
        }
        @keyframes cardIn {
            from { opacity:0; transform: translateY(28px) scale(0.97); filter: blur(4px); }
            to   { opacity:1; transform: translateY(0)    scale(1);    filter: blur(0); }
        }

        .login-logo {
            display: block;
            width: 120px;
            margin: 0 auto 18px;
            filter: drop-shadow(0 0 10px rgba(201,162,39,0.40));
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 4px;
            text-shadow: 0 0 20px rgba(220,30,30,0.45);
        }
        .login-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.68em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.85);
            text-align: center;
            margin-bottom: 8px;
        }
        .notice {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75em;
            color: rgba(255,220,180,0.75);
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .gold-line {
            width: 50px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,162,39,0.55), transparent);
            margin: 0 auto 20px;
        }
        .field-group { margin-bottom: 16px; }
        .field-label {
            display: block;
            font-family: 'Poppins', sans-serif;
            font-size: 0.70em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,210,210,0.70);
            margin-bottom: 6px;
        }
        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            padding: 11px 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88em;
            color: #fff;
            transition: border-color 0.25s, background 0.25s;
        }
        .login-input:focus {
            outline: none;
            border-color: rgba(201,162,39,0.60);
            background: rgba(255,255,255,0.11);
        }
        .login-input::placeholder { color: rgba(255,200,200,0.35); }
        .login-btn {
            width: 100%;
            margin-top: 22px;
            padding: 13px;
            background: rgba(160,10,10,0.70);
            border: 1px solid rgba(220,40,40,0.55);
            border-radius: 9px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.82em;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s, box-shadow 0.25s;
        }
        .login-btn:hover { background: rgba(200,15,15,0.85); box-shadow: 0 0 24px rgba(220,30,30,0.40); }
        .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .login-error {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(200,10,10,0.22);
            border: 1px solid rgba(220,40,40,0.35);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.78em;
            color: #ffaaaa;
            text-align: center;
            display: none;
        }
        .login-success {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(10,120,10,0.22);
            border: 1px solid rgba(40,180,40,0.35);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.78em;
            color: #aaffaa;
            text-align: center;
            display: none;
        }
        .consent-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0 4px;
        }
        .consent-group input[type="checkbox"] {
            margin-top: 3px;
            width: 16px;
            height: 16px;
            accent-color: #c9a227;
            flex-shrink: 0;
            cursor: pointer;
        }
        .consent-group label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.76em;
            line-height: 1.5;
            color: rgba(255,220,220,0.75);
            cursor: pointer;
        }
        .consent-group a {
            color: #c9a227;
            text-decoration: underline;
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b0000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EXPRESART">
    <link rel="apple-touch-icon" href="/img/app-icon-180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/app-icon-32.png">
</head>
<body>

<div class="login-bg"></div>
<div class="curtain-l"></div>
<div class="curtain-r"></div>

<div class="login-card">
    <img src="logo.jpg" alt="EXPRESART" class="login-logo">
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Primer Acceso</p>
    <div class="gold-line"></div>
    <p class="notice">Por seguridad, debes crear una contraseña personal antes de continuar.</p>

    <form id="changeForm">
        <div class="field-group">
            <label class="field-label" for="newPassword">Nueva Contraseña</label>
            <input id="newPassword" class="login-input" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
        </div>
        <div class="field-group">
            <label class="field-label" for="confirmPassword">Confirmar Contraseña</label>
            <input id="confirmPassword" class="login-input" type="password" placeholder="Repite la contraseña" autocomplete="new-password" required>
        </div>
        <div class="consent-group">
            <input type="checkbox" id="consentCheckbox" required>
            <label for="consentCheckbox">He leído y acepto la <a href="privacidad.html" target="_blank" rel="noopener noreferrer">Política de Privacidad</a> y el tratamiento de mis datos personales conforme a la LOPDP.</label>
        </div>
        <button type="submit" class="login-btn" id="changeBtn">Guardar y Continuar</button>
        <div class="login-error"  id="changeError"></div>
        <div class="login-success" id="changeSuccess"></div>
    </form>
</div>

<script src="js/cambiar-password.js"></script>
</body>
</html>
