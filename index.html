<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPRESART — Teatro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .social-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 18px;
        }
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(201,162,39,0.45);
            color: rgba(201,162,39,0.75);
            text-decoration: none;
            transition: all 0.25s;
        }
        .social-link:hover {
            background: rgba(201,162,39,0.15);
            color: #c9a227;
            border-color: rgba(201,162,39,0.8);
            box-shadow: 0 0 14px rgba(201,162,39,0.25);
            transform: translateY(-2px);
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b0000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EXPRESART">
    <link rel="apple-touch-icon" href="/img/app-icon-180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/app-icon-32.png">
</head>
<body>

<!-- ══════════════════════════════
     NAVBAR FLOTANTE GLASSMORPHISM
     ══════════════════════════════ -->
<nav class="top-nav nav-intro">
    <div class="nav-inner">
        <ul class="nav-links">
            <li><a href="index.html"      class="nav-link active">Inicio</a></li>
            <li><a href="nosotros.html"   class="nav-link">Nosotros</a></li>
            <li><a href="cartelera.html"    class="nav-link">Cartelera</a></li>
            <li><a href="producciones.html" class="nav-link">Producciones</a></li>
            <li><a href="agenda.html"       class="nav-link">Agenda</a></li>
            <li><a href="portafolio.html" class="nav-link">Portafolio</a></li>
            <li><a href="login.html"      class="nav-link" id="navLoginLink">Login</a></li>
        </ul>
    </div>
</nav>

<div class="theater">

    <!-- ══════════════════════════════
         ZONA DEL ESCENARIO (60% top)
         El telón solo cubre esta zona
         ══════════════════════════════ -->
    <section class="stage-area">

        <!-- Fondo profundo del escenario -->
        <div class="stage-backdrop"></div>

        <!-- Cono de luz cenital -->
        <div class="spotlight"></div>

        <!-- Destello dramático al abrirse el telón -->
        <div class="stage-flash"></div>

        <!-- Polvo flotante del escenario -->
        <div class="particles">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
        </div>

        <!-- Tablones del escenario -->
        <div class="stage-floor"></div>

        <!-- Candilejas frontales -->
        <div class="footlights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>

        <!-- Panel glassmorphism (se revela al abrirse el telón) -->
        <div class="stage-content">
            <div class="glass-panel">
                <img src="logo.jpg" alt="EXPRESART" class="brand-logo">
                <p class="brand-subtitle">Donde el Arte Cobra Vida</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/expresartactuacion" class="social-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    </a>
                    <a href="https://www.facebook.com/share/1Ad57k3iJg/" class="social-link" aria-label="Facebook" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </a>
                    <a href="https://www.tiktok.com/@expresartactuacion" class="social-link" aria-label="TikTok" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Focos proyectados desde el techo del escenario -->
        <div class="light-beams">
            <div class="beam beam-1"></div>
            <div class="beam beam-2"></div>
            <div class="beam beam-3"></div>
            <div class="beam beam-4"></div>
            <div class="beam beam-5"></div>
            <div class="beam beam-6"></div>
            <div class="beam beam-7"></div>
        </div>

        <!-- Polvo que cae de la cenefa al abrirse el telón -->
        <div class="curtain-dust">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- ══ TELÓN — se abre desde el centro a los lados ══ -->
        <div class="curtain-wrapper">
            <div class="curtain curtain-left"></div>
            <div class="curtain curtain-right"></div>
        </div>

        <!-- Cuerdas que conectan los gemelos con el telón -->
        <div class="twin-rope twin-rope-l"></div>
        <div class="twin-rope twin-rope-r"></div>

        <!-- Cuerda que se acumula en el piso al ser jalada -->
        <div class="twin-rope-pile twin-rope-pile-l"></div>
        <div class="twin-rope-pile twin-rope-pile-r"></div>

        <!-- Gemelo derecho — abre el telón derecho -->
        <div class="cat-stage cat-stage-right">
            <div class="cat-visual cat-visual-right">
                <div class="twin">
                    <div class="twin-shake">
                        <div class="twin-hat"><div class="twin-prop"></div></div>
                        <div class="twin-head">
                            <div class="twin-brow"></div>
                            <div class="twin-brow twin-brow-r"></div>
                            <div class="twin-eye"></div>
                            <div class="twin-eye twin-eye-r"></div>
                            <div class="twin-nose"></div>
                            <div class="twin-mouth"></div>
                        </div>
                        <div class="twin-torso">
                            <div class="twin-bib">
                                <div class="twin-bow"><div class="twin-bow-knot"></div></div>
                            </div>
                        </div>
                        <div class="twin-arm twin-arm-l"></div>
                        <div class="twin-arm twin-arm-r"></div>
                        <div class="twin-belly"></div>
                        <div class="twin-leg twin-leg-l"></div>
                        <div class="twin-leg twin-leg-r"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gemelo izquierdo — abre el telón izquierdo -->
        <div class="cat-stage cat-stage-left">
            <div class="cat-visual">
                <div class="twin">
                    <div class="twin-shake">
                        <div class="twin-hat"><div class="twin-prop"></div></div>
                        <div class="twin-head">
                            <div class="twin-brow"></div>
                            <div class="twin-brow twin-brow-r"></div>
                            <div class="twin-eye"></div>
                            <div class="twin-eye twin-eye-r"></div>
                            <div class="twin-nose"></div>
                            <div class="twin-mouth"></div>
                        </div>
                        <div class="twin-torso">
                            <div class="twin-bib">
                                <div class="twin-bow"><div class="twin-bow-knot"></div></div>
                            </div>
                        </div>
                        <div class="twin-arm twin-arm-l"></div>
                        <div class="twin-arm twin-arm-r"></div>
                        <div class="twin-belly"></div>
                        <div class="twin-leg twin-leg-l"></div>
                        <div class="twin-leg twin-leg-r"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Barra dorada del telón -->
        <div class="curtain-rod"></div>

        <!-- Cenefa de terciopelo con flecos dorados -->
        <div class="valance">
            <div class="valance-body"></div>
            <div class="fringe"></div>
        </div>

    </section>

    <!-- ══════════════════════════════
         ZONA DE BUTACAS (40% bottom)
         El telón NO llega aquí
         ══════════════════════════════ -->
    <section class="audience-area">

        <!-- Sombra superior (proximidad al escenario) -->
        <div class="stage-shadow"></div>

        <!-- Paredes laterales del teatro -->
        <div class="theater-wall wall-left"></div>
        <div class="theater-wall wall-right"></div>

        <!-- Contenedor en perspectiva de las filas -->
        <div class="seats-perspective">
            <div class="seats-rows" id="seatsContainer"></div>
        </div>

    </section>

</div>

<script src="common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
