<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EXPRESART — Cartelera</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse 80% 60% at 50% 30%, #3a000f 0%, #130002 55%, #060002 100%);
            font-family: 'Poppins', sans-serif;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(201,162,39,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(180,10,10,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .cartelera-wrap {
            position: relative;
            z-index: 1;
            padding: 32px 24px 80px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ── Separador dorado ── */
        .gold-rule {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto 0;
        }
        .gold-divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,162,39,0.40) 30%, rgba(201,162,39,0.40) 70%, transparent);
            margin: 0;
        }

        /* ── Título de sección ── */
        .section-heading {
            margin-bottom: 28px;
        }
        .section-heading .eyebrow {
            font-size: 0.63em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.85);
            margin-bottom: 6px;
        }
        .section-heading h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3.5vw, 2.2rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 24px rgba(220,30,30,0.40);
        }
        .section-heading h2 span { color: #c9a227; }

        /* ══════════════════════════════
           PRODUCCIÓN DESTACADA
           ══════════════════════════════ */
        .featured-section {
            margin-bottom: 56px;
        }

        .featured-card {
            background: rgba(255,255,255,0.055);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(201,162,39,0.22);
            border-top: 2px solid rgba(201,162,39,0.50);
            border-radius: 22px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 380px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.55);
        }

        .featured-img-side {
            position: relative;
            overflow: hidden;
            min-height: 300px;
        }
        .featured-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .featured-img-placeholder {
            width: 100%;
            height: 100%;
            min-height: 300px;
            background: linear-gradient(135deg, #3a0010 0%, #1a0005 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .featured-img-placeholder i {
            font-size: 5rem;
            color: rgba(201,162,39,0.30);
        }
        .featured-img-placeholder span {
            font-size: 0.62rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(201,162,39,0.35);
        }
        /* Gradiente de transición foto → texto */
        .featured-img-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 50%, rgba(6,0,2,0.85) 100%);
            pointer-events: none;
        }

        .featured-info {
            padding: 40px 38px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .featured-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: rgba(158,0,0,0.45);
            border: 1px solid rgba(220,40,40,0.50);
            border-radius: 20px;
            font-size: 0.62em;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #ffaaaa;
            width: fit-content;
        }
        .featured-badge i { font-size: 0.9rem; color: #c9a227; }

        .featured-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 3.5vw, 2.5rem);
            font-weight: 900;
            color: #fff;
            line-height: 1.10;
            text-shadow: 0 0 30px rgba(220,30,30,0.35);
        }

        .featured-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .featured-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.76em;
            color: rgba(201,162,39,0.85);
        }
        .featured-meta-item i { font-size: 1rem; }

        .featured-desc {
            font-size: 0.84em;
            line-height: 1.72;
            color: rgba(255,220,220,0.72);
            font-weight: 300;
        }

        .featured-line {
            width: 50px; height: 2px;
            background: linear-gradient(90deg, #c9a227, transparent);
        }

        /* ══════════════════════════════
           GRID DE PRODUCCIONES
           ══════════════════════════════ */
        .producciones-section {
            margin-top: 48px;
        }

        .prod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .prod-card {
            background: rgba(255,255,255,0.045);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 16px;
            padding: 28px 26px 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s;
        }
        .prod-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(201,162,39,0.55) 50%, transparent);
        }
        .prod-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 55px rgba(0,0,0,0.50), 0 0 0 1px rgba(201,162,39,0.22);
            border-color: rgba(201,162,39,0.22);
        }

        .prod-year {
            display: inline-block;
            padding: 3px 12px;
            background: rgba(201,162,39,0.12);
            border: 1px solid rgba(201,162,39,0.30);
            border-radius: 20px;
            font-size: 0.62em;
            letter-spacing: 2px;
            color: #c9a227;
            margin-bottom: 14px;
        }

        .prod-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.18rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            line-height: 1.25;
        }

        .prod-desc {
            font-size: 0.78em;
            line-height: 1.65;
            color: rgba(255,220,220,0.58);
            font-weight: 300;
        }

        /* ══════════════════════════════
           ESTADO VACÍO
           ══════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }
        .empty-state i {
            font-size: 5rem;
            color: rgba(201,162,39,0.20);
            display: block;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: rgba(255,255,255,0.28);
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 0.78em;
            color: rgba(255,200,200,0.28);
            letter-spacing: 1px;
        }

        /* ── Thumbnail de video en tarjeta de producción ── */
        .prod-thumb {
            position: relative;
            width: calc(100% + 52px);
            margin: -28px -26px 18px;
            border-radius: 16px 16px 0 0;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16/9;
            background: #111;
        }
        .prod-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.35s ease;
        }
        .prod-thumb:hover img { transform: scale(1.04); }
        .prod-thumb-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(201,162,39,0.07);
        }
        .prod-thumb-placeholder i { font-size: 3rem; color: rgba(201,162,39,0.35); }
        .prod-play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.28);
            transition: background 0.25s;
        }
        .prod-thumb:hover .prod-play-overlay { background: rgba(0,0,0,0.45); }
        .prod-play-btn {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: rgba(201,162,39,0.90);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.22s, background 0.22s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .prod-thumb:hover .prod-play-btn { transform: scale(1.12); background: #c9a227; }
        .prod-play-btn i { font-size: 1.6rem; color: #060002; margin-left: 3px; }

        /* ── Modal de video ── */
        #videoModal { display: none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; }
        #videoModal.vm-open { display: flex; }
        .vm-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.88); }
        .vm-box {
            position: relative; z-index: 1;
            width: min(880px, 94vw);
            background: #0d0d0d;
            border: 1px solid rgba(201,162,39,0.25);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        }
        .vm-close {
            position: absolute; top: 10px; right: 12px; z-index: 2;
            background: rgba(0,0,0,0.55); border: none; color: #fff;
            border-radius: 50%; width: 34px; height: 34px;
            cursor: pointer; font-size: 1.3rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .vm-close:hover { background: rgba(201,162,39,0.7); }
        .vm-title {
            padding: 14px 48px 14px 18px;
            font-family: 'Playfair Display', serif;
            font-size: 1rem; color: rgba(255,220,180,0.85);
            border-bottom: 1px solid rgba(201,162,39,0.15);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .vm-title:empty { display: none; }
        .vm-ratio { position: relative; padding-bottom: 56.25%; height: 0; }
        .vm-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; referrerpolicy: strict-origin-when-cross-origin; }

        /* ── Footer ── */
        .cartelera-footer {
            text-align: center;
            padding: 32px 24px 40px;
            border-top: 1px solid rgba(201,162,39,0.15);
            margin-top: 48px;
        }
        .cartelera-footer p {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75em;
            color: rgba(255,200,200,0.40);
            letter-spacing: 1.5px;
        }

        /* ── Responsive ── */
        @media (max-width: 760px) {
            .featured-card {
                grid-template-columns: 1fr;
                min-height: auto;
            }
            .featured-img-side::after { display: none; }
            .featured-info { padding: 28px 24px 24px; }
            .featured-title { font-size: 1.6rem; }
        }
        @media (max-width: 520px) {
            .cartelera-wrap { padding: 80px 14px 60px; }
            .prod-grid { grid-template-columns: 1fr; gap: 16px; }
        }
        .social-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 0 0 48px;
        }
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(201,162,39,0.45);
            color: rgba(201,162,39,0.75);
            text-decoration: none;
            transition: all 0.25s;
        }
        .social-link:hover {
            background: rgba(201,162,39,0.15);
            color: #c9a227;
            border-color: rgba(201,162,39,0.8);
            box-shadow: 0 0 14px rgba(201,162,39,0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
